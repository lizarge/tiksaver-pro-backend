services:
  - type: web
    name: tiksaver-pro-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: tiktok-trending1.p.rapidapi.com
